<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>
    <main>
        <div class="block-text">
            <p>Choose your element</p>
        </div>
        <div class="figures">
            <div class="block" id="rock">
                <img src="./img/rock.png" alt="Rock">
            </div>
            <div class="block" id="paper">
                <img src="./img/paper.png" alt="Paper">
            </div>
            <div class="block" id="scissors">
                <img src="./img/scissors.png" alt="Scissors">
            </div>
        </div>
        <div class="result" id="win">
            <i class="fa-solid fa-x" id="x-win"></i>
            <p>YOU WIN!</p>
        </div>
        <div class="result" id="tie">
            <i class="fa-solid fa-x" id="x-tie"></i>
            <p>IT IS A TIE!</p>
        </div>
        <div class="result" id="lose">
            <i class="fa-solid fa-x" id="x-lose"></i>
            <p>YOU LOSE!</p>
        </div>
    </main>
    <script src="./index.js"></script>
    <script src="https://kit.fontawesome.com/1699803d01.js" crossorigin="anonymous"></script>
</body>
</html>
